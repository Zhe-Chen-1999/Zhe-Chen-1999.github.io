name: Compile CV

on:
  push:
    branches: [main]
    paths:
      - "**.tex"
      - "**.bib"
      - "**.sty"
      - "**.cls"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect main .tex file
        id: detect
        run: |
          # Use main.tex if it exists, otherwise find the file with \documentclass
          if [ -f "main.tex" ]; then
            echo "file=main.tex" >> $GITHUB_OUTPUT
          else
            FILE=$(grep -rl '\\documentclass' --include="*.tex" . | head -1)
            echo "file=$FILE" >> $GITHUB_OUTPUT
          fi

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ steps.detect.outputs.file }}
          latexmk_use_xelatex: true

      - name: Rename to cv.pdf
        run: |
          STEM=$(basename "${{ steps.detect.outputs.file }}" .tex)
          mv "${STEM}.pdf" cv.pdf

      - name: Commit cv.pdf back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-compile CV [skip ci]"
          file_pattern: cv.pdf
